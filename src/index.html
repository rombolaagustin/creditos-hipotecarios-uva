<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ─── Helpers ─── */
const fmt = (n, dec = 0) => new Intl.NumberFormat('es-AR', { minimumFractionDigits: dec, maximumFractionDigits: dec }).format(n);
const fmtARS = (n) => `$ ${fmt(n, 2)}`;
const fmtUSD = (n) => `US$ ${fmt(n, 0)}`;

const TABS = [
  { id: 'simulador', label: 'Simulador' },
  { id: 'amortizacion', label: 'Amortización' },
  { id: 'bancos', label: 'Bancos', soon: true },
  { id: 'inflacion', label: 'Inflación y tipo de cambio' },
];

/* ─── Historical UVA ─── */
function useHistoricalUVA() {
  const [data, setData] = useState({ series: [], loading: true, error: null });
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const BASE = 'https://api.bcra.gob.ar/estadisticas/v4.0/Monetarias/31';
        const [r1, r2] = await Promise.all([
          fetch(`${BASE}?limit=3000`).then(r => r.json()),
          fetch(`${BASE}?limit=1000&offset=3000`).then(r => r.json()),
        ]);
        if (cancelled) return;
        const today = new Date().toISOString().split('T')[0];
        const all = [
          ...(r1?.results?.[0]?.detalle || []),
          ...(r2?.results?.[0]?.detalle || []),
        ].filter(d => d.fecha <= today).sort((a, b) => a.fecha.localeCompare(b.fecha));
        if (!all.length) throw new Error();
        const byMonth = {};
        all.forEach(d => { const ym = d.fecha.slice(0, 7); if (!byMonth[ym]) byMonth[ym] = { ym, valor: d.valor }; });
        const series = Object.values(byMonth).sort((a, b) => a.ym.localeCompare(b.ym));
        setData({ series, loading: false, error: null });
      } catch(e) {
        if (!cancelled) setData({ series: [], loading: false, error: 'Datos históricos no disponibles' });
      }
    })();
    return () => { cancelled = true; };
  }, []);
  return data;
}

/* ─── Historical TC ─── */
function useHistoricalTC() {
  const [data, setData] = useState({ series: [], loading: true, error: null });
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const BASE = 'https://api.bcra.gob.ar/estadisticas/v4.0/Monetarias/5';
        const [r1, r2] = await Promise.all([
          fetch(`${BASE}?limit=3000`).then(r => r.json()),
          fetch(`${BASE}?limit=3000&offset=3000`).then(r => r.json()),
        ]);
        if (cancelled) return;
        const today = new Date().toISOString().split('T')[0];
        const all = [
          ...(r1?.results?.[0]?.detalle || []),
          ...(r2?.results?.[0]?.detalle || []),
        ].filter(d => d.fecha <= today).sort((a, b) => a.fecha.localeCompare(b.fecha));
        if (!all.length) throw new Error();
        const byMonth = {};
        all.forEach(d => { const ym = d.fecha.slice(0, 7); if (!byMonth[ym]) byMonth[ym] = { ym, valor: d.valor }; });
        const series = Object.values(byMonth).sort((a, b) => a.ym.localeCompare(b.ym));
        setData({ series, loading: false, error: null });
      } catch(e) {
        if (!cancelled) setData({ series: [], loading: false, error: 'Datos históricos no disponibles' });
      }
    })();
    return () => { cancelled = true; };
  }, []);
  return data;
}

/* ─── French Amortization ─── */
function calcFrench(capitalUVA, tna, months) {
  const r = tna / 12;
  if (r === 0) return { cuotaUVA: capitalUVA / months, totalUVA: capitalUVA, schedule: [] };
  const cuotaUVA = capitalUVA * (r * Math.pow(1 + r, months)) / (Math.pow(1 + r, months) - 1);
  const schedule = [];
  let saldo = capitalUVA;
  for (let i = 1; i <= months; i++) {
    const interes = saldo * r;
    const amort = cuotaUVA - interes;
    saldo -= amort;
    schedule.push({ mes: i, cuota: cuotaUVA, interes, amortizacion: amort, saldo: Math.max(0, saldo) });
  }
  return { cuotaUVA, totalUVA: cuotaUVA * months, schedule };
}

/* ─── Theme ─── */
function useTheme() {
  const [dark, setDark] = useState(() => {
    const s = localStorage.getItem('uva-theme');
    return s ? s === 'dark' : true;
  });
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    localStorage.setItem('uva-theme', dark ? 'dark' : 'light');
  }, [dark]);
  return [dark, setDark];
}

/* ─── Mobile ─── */
function useIsMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth <= 640);
  useEffect(() => {
    let t;
    const debounced = () => { clearTimeout(t); t = setTimeout(() => setMobile(window.innerWidth <= 640), 100); };
    window.addEventListener('resize', debounced);
    return () => window.removeEventListener('resize', debounced);
  }, []);
  return mobile;
}

/* ─── API ─── */
function useRates() {
  const [rates, setRates] = useState({ uva: null, usdOficial: null, fecha: null, loading: true, error: null });
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const safeFetch = async (url) => { try { const r = await fetch(url); return r.ok ? r.json() : null; } catch(e) { return null; } };
      const [uvaRes, tcRes] = await Promise.all([
        safeFetch('https://api.bcra.gob.ar/estadisticas/v4.0/Monetarias/31?limit=30'),
        safeFetch('https://api.bcra.gob.ar/estadisticas/v4.0/Monetarias/5?limit=30'),
      ]);
      const FALLBACK = { uva: 1908.11, usdOficial: 1412.9865, fecha: '27 abr 2026' };
      const today = new Date().toISOString().split('T')[0];
      const latestEntry = (res) => (res?.results?.[0]?.detalle || []).find(d => d.fecha <= today) || null;
      const uvaEntry = latestEntry(uvaRes);
      const tcEntry = latestEntry(tcRes);
      const uvaValue = uvaEntry?.valor || null;
      const tcValue = tcEntry?.valor || null;
      const fechaRaw = uvaEntry?.fecha || null;
      const fecha = fechaRaw ? new Intl.DateTimeFormat('es-AR', { day: 'numeric', month: 'short', year: 'numeric' }).format(new Date(fechaRaw + 'T12:00:00')) : FALLBACK.fecha;
      const errors = [...(!uvaValue ? ['UVA'] : []), ...(!tcValue ? ['TC Oficial'] : [])];
      if (!cancelled) setRates({ uva: uvaValue || FALLBACK.uva, usdOficial: tcValue || FALLBACK.usdOficial, fecha, loading: false, error: errors.length ? `${errors.join(' y ')} con valor estimado al ${FALLBACK.fecha} — API del BCRA no disponible` : null });
    })();
    return () => { cancelled = true; };
  }, []);
  return rates;
}

/* ─── Rates Bar (mobile only) ─── */
function RatesBar({ rates }) {
  return (
    <div style={{
      padding: '8px 16px', background: 'var(--bg-elevated)',
      borderBottom: '1px solid var(--border)',
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
    }}>
      <div style={{ display: 'flex', gap: 10, fontSize: 11, fontFamily: 'var(--mono)' }}>
        <span>UVA <span style={{ color: 'var(--cyan)', fontWeight: 600 }}>{fmtARS(rates.uva)}</span></span>
        <span style={{ color: 'var(--border)' }}>|</span>
        <span>TC Oficial <span style={{ color: 'var(--green)', fontWeight: 600 }}>{fmtARS(rates.usdOficial)}</span></span>
      </div>
      {rates.fecha && (
        <div style={{ fontSize: 9, color: 'var(--text-muted)', letterSpacing: '0.03em' }}>Dato al {rates.fecha}</div>
      )}
    </div>
  );
}

/* ─── Dual Input (Slider + Number) ─── */
function DualInput({ label, value, onChange, min, max, step, prefix, suffix, decimals }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState('');
  const inputRef = useRef(null);
  const pct = ((value - min) / (max - min)) * 100;
  const dec = decimals != null ? decimals : (step < 1 ? (step < 0.1 ? 2 : 1) : 0);

  const commit = () => {
    const v = parseFloat(draft.replace(/[^0-9.,\-]/g, '').replace(',', '.'));
    if (!isNaN(v)) onChange(Math.max(min, Math.min(max, v)));
    setEditing(false);
  };

  const startEdit = () => {
    setDraft(String(value));
    setEditing(true);
    setTimeout(() => inputRef.current?.select(), 10);
  };

  return (
    <div style={{ marginBottom: 22 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <label style={{ fontSize: 12, color: 'var(--text-muted)', fontWeight: 500, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{label}</label>
        {editing ? (
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            {prefix && <span style={{ fontSize: 13, color: 'var(--text-muted)', fontFamily: 'var(--mono)' }}>{prefix}</span>}
            <input ref={inputRef} type="number" value={draft} min={min} max={max} step={step}
              onChange={e => setDraft(e.target.value)}
              onBlur={commit} onKeyDown={e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') setEditing(false); }}
              style={{
                width: 100, background: 'var(--bg)', border: '1px solid var(--border-focus)',
                borderRadius: 6, padding: '4px 8px', color: 'var(--cyan)', fontFamily: 'var(--mono)',
                fontSize: 14, fontWeight: 600, textAlign: 'right', outline: 'none',
              }}
              autoFocus
            />
            {suffix && <span style={{ fontSize: 13, color: 'var(--text-muted)', fontFamily: 'var(--mono)' }}>{suffix}</span>}
          </div>
        ) : (
          <button onClick={startEdit} style={{
            background: 'var(--bg-input)', border: '1px solid var(--border)', borderRadius: 6,
            padding: '4px 10px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 2,
            transition: 'all 0.2s',
          }}>
            <span style={{ fontFamily: 'var(--mono)', fontSize: 14, fontWeight: 600, color: 'var(--cyan)' }}>
              {prefix}{fmt(value, dec)}{suffix}
            </span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ marginLeft: 4, opacity: 0.4 }}>
              <path d="M8.5 1.5l2 2L4 10H2V8L8.5 1.5z" stroke="currentColor" strokeWidth="1.2" fill="none" />
            </svg>
          </button>
        )}
      </div>
      {/* Track */}
      <div style={{ position: 'relative', height: 20, display: 'flex', alignItems: 'center' }}>
        <div style={{
          position: 'absolute', left: 0, right: 0, height: 4, borderRadius: 2, background: 'var(--border)',
        }}>
          <div style={{
            width: `${pct}%`, height: '100%', borderRadius: 2,
            background: `linear-gradient(90deg, var(--accent), var(--cyan))`,
            transition: 'width 0.1s',
          }}></div>
        </div>
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={e => onChange(parseFloat(e.target.value))}
          style={{ width: '100%', height: 20, position: 'relative', zIndex: 1 }}
        />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
        <span style={{ fontSize: 10, color: 'var(--text-muted)', fontFamily: 'var(--mono)' }}>{prefix}{fmt(min, 0)}{suffix}</span>
        <span style={{ fontSize: 10, color: 'var(--text-muted)', fontFamily: 'var(--mono)' }}>{prefix}{fmt(max, 0)}{suffix}</span>
      </div>
    </div>
  );
}

/* ─── Stacked-Area Chart (SVG) ─── */
function AmortChart({ schedule, valorUVA }) {
  const W = 600, H = 220, PAD = { top: 20, right: 16, bottom: 32, left: 56 };
  const cW = W - PAD.left - PAD.right, cH = H - PAD.top - PAD.bottom;
  if (!schedule.length) return null;

  // Sample every N months for performance
  const sampleRate = Math.max(1, Math.floor(schedule.length / 80));
  const data = schedule.filter((_, i) => i % sampleRate === 0 || i === schedule.length - 1);

  const maxVal = data[0].cuota;
  const x = (i) => PAD.left + (i / (data.length - 1)) * cW;
  const y = (v) => PAD.top + cH - (v / maxVal) * cH;

  // Stacked area: interest bottom, amort on top
  const interesArea = data.map((d, i) => `${x(i)},${y(d.interes)}`).join(' ');
  const amortArea = data.map((d, i) => `${x(i)},${y(d.interes + d.amortizacion)}`).join(' ');
  const baseline = `${x(data.length - 1)},${y(0)} ${x(0)},${y(0)}`;
  const interesTop = data.map((d, i) => `${x(i)},${y(d.interes)}`).join(' ');

  // Y-axis labels
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(p => ({ v: p * maxVal, y: y(p * maxVal) }));

  // X-axis labels (years)
  const totalYears = Math.ceil(schedule.length / 12);
  const xLabels = [];
  for (let yr = 0; yr <= totalYears; yr += Math.max(1, Math.floor(totalYears / 6))) {
    const idx = data.findIndex(d => d.mes >= yr * 12) || 0;
    if (idx >= 0) xLabels.push({ label: `${yr}a`, x: x(idx) });
  }

  return (
    <div style={{
      background: 'var(--bg-card)', borderRadius: 'var(--radius)', border: '1px solid var(--border)',
      padding: '20px 16px 12px', marginTop: 20,
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, padding: '0 4px' }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 600 }}>Composición de la cuota <span style={{ fontSize: 11, fontWeight: 400, color: 'var(--text-muted)' }}>en UVAs</span></div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>Sistema francés — evolución en el tiempo · eje Y en UVAs</div>
        </div>
        <div style={{ display: 'flex', gap: 16 }}>
          <span style={{ fontSize: 11, color: 'var(--green)', display: 'flex', alignItems: 'center', gap: 5 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: 'var(--green)', opacity: 0.7 }}></span> Capital
          </span>
          <span style={{ fontSize: 11, color: 'var(--amber)', display: 'flex', alignItems: 'center', gap: 5 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: 'var(--amber)', opacity: 0.7 }}></span> Interés
          </span>
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
        <defs>
          <linearGradient id="gAmort" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--green)" stopOpacity="0.5" />
            <stop offset="100%" stopColor="var(--green)" stopOpacity="0.05" />
          </linearGradient>
          <linearGradient id="gInteres" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--amber)" stopOpacity="0.45" />
            <stop offset="100%" stopColor="var(--amber)" stopOpacity="0.05" />
          </linearGradient>
        </defs>
        {/* Grid lines */}
        {yTicks.map((t, i) => (
          <g key={i}>
            <line x1={PAD.left} y1={t.y} x2={W - PAD.right} y2={t.y} stroke="var(--border)" strokeWidth="0.5" strokeDasharray={i === 0 ? '' : '2,3'} />
            <text x={PAD.left - 8} y={t.y + 3} textAnchor="end" fill="var(--text-muted)" fontSize="9" fontFamily="var(--mono)">{fmt(t.v * valorUVA, 0)}</text>
          </g>
        ))}
        {/* Interest area (bottom) */}
        <polygon points={`${interesArea} ${baseline}`} fill="url(#gInteres)" />
        {/* Amort area (stacked) */}
        <polygon points={`${amortArea} ${interesTop.split(' ').reverse().join(' ')}`} fill="url(#gAmort)" />
        {/* Lines */}
        <polyline points={amortArea} fill="none" stroke="var(--green)" strokeWidth="1.5" opacity="0.8" />
        <polyline points={interesArea} fill="none" stroke="var(--amber)" strokeWidth="1.5" opacity="0.8" />
        {/* X labels */}
        {xLabels.map((l, i) => (
          <text key={i} x={l.x} y={H - 6} textAnchor="middle" fill="var(--text-muted)" fontSize="9" fontFamily="var(--mono)">{l.label}</text>
        ))}
      </svg>
    </div>
  );
}

/* ─── Donut Chart ─── */
function DonutChart({ capital, interes }) {
  const total = capital + interes;
  const pctCapital = capital / total;
  const R = 42, C = 2 * Math.PI * R;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 20, padding: '16px 20px', background: 'var(--bg-card)', borderRadius: 'var(--radius)', border: '1px solid var(--border)' }}>
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={R} fill="none" stroke="var(--border)" strokeWidth="8" />
        <circle cx="50" cy="50" r={R} fill="none" stroke="var(--cyan)" strokeWidth="8"
          strokeDasharray={`${pctCapital * C} ${C}`} strokeDashoffset={C * 0.25}
          strokeLinecap="round" style={{ transition: 'stroke-dasharray 0.5s' }} />
        <circle cx="50" cy="50" r={R} fill="none" stroke="var(--amber)" strokeWidth="8"
          strokeDasharray={`${(1 - pctCapital) * C} ${C}`} strokeDashoffset={C * 0.25 - pctCapital * C}
          strokeLinecap="round" style={{ transition: 'all 0.5s' }} />
        <text x="50" y="48" textAnchor="middle" fill="var(--text)" fontSize="13" fontWeight="700" fontFamily="var(--mono)">{Math.round(pctCapital * 100)}%</text>
        <text x="50" y="60" textAnchor="middle" fill="var(--text-muted)" fontSize="8" fontFamily="var(--font)">capital</text>
      </svg>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 10 }}>Costo total del crédito</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

/* ─── Variation Bar Chart ─── */
function VariationBarChart({ data, title, subtitle, from, setFrom, to, setTo, minYM, maxYM, showLegend, isMobile }) {
  const W = 800, H = 200;
  const PAD = { top: 20, right: 16, bottom: 36, left: 52 };
  const cW = W - PAD.left - PAD.right, cH = H - PAD.top - PAD.bottom;
  const [tooltip, setTooltip] = useState(null);

  const inputS = {
    background: 'var(--bg-input)', border: '1px solid var(--border)', borderRadius: 6,
    padding: '4px 8px', color: 'var(--text)', fontSize: 11, fontFamily: 'var(--font)',
    outline: 'none', cursor: 'pointer', colorScheme: 'dark',
  };

  const inner = data.length ? (() => {
    const maxV = Math.max(...data.map(d => d.value), 0.1);
    const minV = Math.min(...data.map(d => d.value), 0);
    const range = maxV - minV || 1;
    const yS = v => PAD.top + cH - ((v - minV) / range) * cH;
    const yZero = yS(0);
    const barW = Math.max(2, Math.floor(cW / data.length) - 1);
    const labelEvery = Math.max(1, Math.ceil(data.length / 14));
    const rawStep = range / 4;
    const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const step = Math.ceil(rawStep / mag) * mag;
    const ticks = [];
    for (let v = Math.floor(minV / step) * step; v <= maxV + step * 0.1; v += step) ticks.push(Math.round(v * 100) / 100);
    return { maxV, minV, yS, yZero, barW, labelEvery, ticks };
  })() : null;

  const TW = 110, TH = 42;

  return (
    <div style={{ background: 'var(--bg-card)', borderRadius: 'var(--radius)', border: '1px solid var(--border)', padding: '20px 16px 12px', marginTop: 20 }}>
      <div style={{ display: 'flex', flexDirection: isMobile ? 'column' : 'row', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16, gap: 12 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 600 }}>{title}</div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>{subtitle}</div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap', width: isMobile ? '100%' : 'auto' }}>
          <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>Desde</span>
          <input type="month" value={from} min={minYM} max={to} onChange={e => setFrom(e.target.value)} style={{ ...inputS, ...(isMobile ? { flex: 1 } : {}) }} />
          <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>hasta</span>
          <input type="month" value={to} min={from} max={maxYM} onChange={e => setTo(e.target.value)} style={{ ...inputS, ...(isMobile ? { flex: 1 } : {}) }} />
        </div>
      </div>
      {!inner ? (
        <div style={{ textAlign: 'center', padding: '32px 0', color: 'var(--text-muted)', fontSize: 12 }}>Sin datos para el rango seleccionado</div>
      ) : (
        <>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}
            onMouseLeave={() => setTooltip(null)}>
            {inner.ticks.map((v, i) => (
              <g key={i}>
                <line x1={PAD.left} y1={inner.yS(v)} x2={W - PAD.right} y2={inner.yS(v)} stroke="var(--border)" strokeWidth={v === 0 ? 1 : 0.5} strokeDasharray={v === 0 ? '' : '2,3'} />
                <text x={PAD.left - 5} y={inner.yS(v) + 3} textAnchor="end" fill="var(--text-muted)" fontSize="9" fontFamily="var(--mono)">{fmt(v, 1)}%</text>
              </g>
            ))}
            {data.map((d, i) => {
              const cx = PAD.left + (i + 0.5) * (cW / data.length);
              const x = cx - inner.barW / 2;
              const pos = d.value >= 0;
              const y = pos ? inner.yS(d.value) : inner.yZero;
              const h = Math.max(1, Math.abs(inner.yS(d.value) - inner.yZero));
              const tx = Math.min(Math.max(cx - TW / 2, PAD.left), W - PAD.right - TW);
              const ty = pos ? Math.max(inner.yS(d.value) - TH - 8, PAD.top) : inner.yZero + 8;
              return (
                <g key={i}
                  onMouseEnter={() => setTooltip({ i, tx, ty, value: d.value, label: d.label, pos })}
                  style={{ cursor: 'crosshair' }}>
                  <rect x={x} y={y} width={inner.barW} height={h}
                    fill={pos ? 'var(--cyan)' : 'var(--red)'}
                    opacity={tooltip && tooltip.i === i ? 1 : 0.85} rx="1" />
                  {/* invisible wider hit area */}
                  <rect x={cx - Math.max(inner.barW, 6) / 2} y={PAD.top} width={Math.max(inner.barW, 6)} height={cH} fill="transparent" />
                </g>
              );
            })}
            {data.map((d, i) => {
              if (i % inner.labelEvery !== 0) return null;
              return <text key={i} x={PAD.left + (i + 0.5) * (cW / data.length)} y={H - 4} textAnchor="middle" fill="var(--text-muted)" fontSize="9" fontFamily="var(--font)">{d.label}</text>;
            })}
            {tooltip && (
              <g style={{ pointerEvents: 'none' }}>
                <rect x={tooltip.tx} y={tooltip.ty} width={TW} height={TH} rx="5"
                  fill="var(--bg-elevated)" stroke="var(--border)" strokeWidth="1"
                  style={{ filter: 'drop-shadow(0 2px 6px rgba(0,0,0,0.3))' }} />
                <text x={tooltip.tx + TW / 2} y={tooltip.ty + 15} textAnchor="middle"
                  fill="var(--text-muted)" fontSize="9" fontFamily="var(--font)">{tooltip.label}</text>
                <text x={tooltip.tx + TW / 2} y={tooltip.ty + 31} textAnchor="middle"
                  fill={tooltip.pos ? 'var(--cyan)' : 'var(--red)'} fontSize="13" fontWeight="700" fontFamily="var(--mono)">
                  {tooltip.pos ? '+' : ''}{fmt(tooltip.value, 2)}%
                </text>
              </g>
            )}
          </svg>
          {showLegend && (
            <div style={{ display: 'flex', gap: 16, marginTop: 6, justifyContent: 'flex-end' }}>
              <span style={{ fontSize: 10, color: 'var(--cyan)', display: 'flex', alignItems: 'center', gap: 4 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: 'var(--cyan)' }}></span> Sube</span>
              <span style={{ fontSize: 10, color: 'var(--red)', display: 'flex', alignItems: 'center', gap: 4 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: 'var(--red)' }}></span> Baja</span>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ─── Inflacion Tab ─── */
function InflacionTab({ isMobile }) {
  const uva = useHistoricalUVA();
  const tc = useHistoricalTC();
  const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const now = () => new Date().toISOString().slice(0, 7);
  const minus3Y = () => { const d = new Date(); d.setFullYear(d.getFullYear() - 3); return d.toISOString().slice(0, 7); };

  const [uvaMFrom, setUvaMFrom] = useState(minus3Y);
  const [uvaMTo, setUvaMTo] = useState(now);
  const [uvaAFrom, setUvaAFrom] = useState('2016-03');
  const [uvaATo, setUvaATo] = useState(now);
  const [tcMFrom, setTcMFrom] = useState(minus3Y);
  const [tcMTo, setTcMTo] = useState(now);
  const [tcAFrom, setTcAFrom] = useState('2016-01');
  const [tcATo, setTcATo] = useState(now);

  const fmtLabel = ym => { const [y, m] = ym.split('-'); return `${MONTHS[parseInt(m) - 1]} ${y.slice(2)}`; };

  const buildMonthly = (series, from, to) => {
    const f = series.filter(s => s.ym >= from && s.ym <= to);
    return f.slice(1).map((s, i) => ({ label: fmtLabel(s.ym), value: ((s.valor - f[i].valor) / f[i].valor) * 100 }));
  };
  const buildAnnual = (series, from, to) => {
    const f = series.filter(s => s.ym >= from && s.ym <= to);
    return f.map(s => {
      const prev = series.find(p => p.ym === `${parseInt(s.ym.slice(0, 4)) - 1}${s.ym.slice(4)}`);
      return prev ? { label: fmtLabel(s.ym), value: ((s.valor - prev.valor) / prev.valor) * 100 } : null;
    }).filter(Boolean);
  };

  const uvaMonthly = useMemo(() => buildMonthly(uva.series, uvaMFrom, uvaMTo), [uva.series, uvaMFrom, uvaMTo]);
  const uvaAnnual  = useMemo(() => buildAnnual(uva.series, uvaAFrom, uvaATo),   [uva.series, uvaAFrom, uvaATo]);
  const tcMonthly  = useMemo(() => buildMonthly(tc.series, tcMFrom, tcMTo),      [tc.series, tcMFrom, tcMTo]);
  const tcAnnual   = useMemo(() => buildAnnual(tc.series, tcAFrom, tcATo),       [tc.series, tcAFrom, tcATo]);

  const uvaMinYM = uva.series[0]?.ym || '2016-03';
  const uvaMaxYM = uva.series[uva.series.length - 1]?.ym || now();
  const tcMinYM  = tc.series[0]?.ym  || '2016-01';
  const tcMaxYM  = tc.series[tc.series.length - 1]?.ym  || now();

  const loading = uva.loading || tc.loading;

  if (loading) return (
    <div style={{ textAlign: 'center', padding: 80, color: 'var(--text-muted)' }}>
      <div style={{ fontSize: 20, marginBottom: 12, animation: 'pulse 1.5s ease infinite' }}>◉</div>
      Cargando datos históricos...
    </div>
  );

  return (
    <div style={{ animation: 'fadeIn 0.3s ease forwards' }}>
      <div style={{ marginBottom: 28 }}>
        <h2 style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-0.02em' }}>Inflación y tipo de cambio</h2>
        <p style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4 }}>Evolución histórica · primeros de mes · fuente: BCRA</p>
      </div>

      <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 4, letterSpacing: '0.02em' }}>UVA</div>
      <VariationBarChart data={uvaMonthly} title="Variación mensual UVA" subtitle="Variación % respecto al mes anterior"
        from={uvaMFrom} setFrom={setUvaMFrom} to={uvaMTo} setTo={setUvaMTo} minYM={uvaMinYM} maxYM={uvaMaxYM} isMobile={isMobile} />
      <VariationBarChart data={uvaAnnual} title="Variación anual UVA" subtitle="Variación % respecto al mismo mes del año anterior"
        from={uvaAFrom} setFrom={setUvaAFrom} to={uvaATo} setTo={setUvaATo} minYM={uvaMinYM} maxYM={uvaMaxYM} isMobile={isMobile} />

      <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-secondary)', marginTop: 32, marginBottom: 4, letterSpacing: '0.02em' }}>Tipo de cambio oficial (COM A3500)</div>
      <VariationBarChart data={tcMonthly} title="Variación mensual tipo de cambio oficial" subtitle="Variación % respecto al mes anterior"
        from={tcMFrom} setFrom={setTcMFrom} to={tcMTo} setTo={setTcMTo} minYM={tcMinYM} maxYM={tcMaxYM} showLegend isMobile={isMobile} />
      <VariationBarChart data={tcAnnual} title="Variación anual tipo de cambio oficial" subtitle="Variación % respecto al mismo mes del año anterior"
        from={tcAFrom} setFrom={setTcAFrom} to={tcATo} setTo={setTcATo} minYM={tcMinYM} maxYM={tcMaxYM} showLegend isMobile={isMobile} />
    </div>
  );
}

          )}
          <button onClick={() => setDark(!dark)} style={{
            background: 'var(--bg-input)', border: '1px solid var(--border)', borderRadius: 7,
            width: 34, height: 34, cursor: 'pointer', display: 'grid', placeItems: 'center',
            fontSize: 15, color: 'var(--text)', transition: 'all 0.2s',
          }}>{dark ? '☀' : '☾'}</button>
        </div>
      </header>

      {isMobile && !rates.loading && <RatesBar rates={rates} />}

      {rates.error && (
        <div style={{ margin: '12px 28px 0', padding: '8px 14px', borderRadius: 8, background: 'var(--amber-dim)', border: '1px solid rgba(251,191,36,0.15)', fontSize: 12, color: 'var(--amber)' }}>
          ⚠ {rates.error}
        </div>
      )}

      <main style={{ maxWidth: 1080, width: '100%', margin: '0 auto', padding: isMobile ? '16px 16px 60px' : '20px 28px 60px', position: 'relative', zIndex: 1, flex: 1 }}>
        <TabBar active={tab} setActive={setTab} isMobile={isMobile} />

        {rates.loading ? (
          <div style={{ textAlign: 'center', padding: 80, color: 'var(--text-muted)' }}>
            <div style={{ fontSize: 20, marginBottom: 12, animation: 'pulse 1.5s ease infinite' }}>◉</div>
            Cargando cotizaciones...
          </div>
        ) : tab === 'simulador' ? (
          <SimuladorTab tna={tna} setTna={setTna} valorUSD={valorUSD} setValorUSD={setValorUSD}
            anticipo={anticipo} setAnticipo={setAnticipo} maxCuota={maxCuota} setMaxCuota={setMaxCuota}
            plazo={plazo} setPlazo={setPlazo} calc={calc} isMobile={isMobile} />
        ) : tab === 'amortizacion' ? (
          <div style={{ animation: 'fadeIn 0.3s ease forwards' }}>
            <div style={{ marginBottom: 20 }}>
              <h2 style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-0.02em' }}>Cuadro de Amortización</h2>
              <p style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4 }}>
                Sistema Francés · {plazo * 12} cuotas · Capital: {fmt(calc.montoUVAs, 0)} UVAs · TNA: {tna}%
              </p>
            </div>
            <div style={{ background: 'var(--bg-card)', borderRadius: 'var(--radius)', border: '1px solid var(--border)', padding: 16 }}>
              <AmortTable schedule={calc.schedule} valorUVA={calc.valorUVA} />
            </div>
            <AmortChart schedule={calc.schedule} valorUVA={calc.valorUVA} />
          </div>
        ) : tab === 'inflacion' ? (
          <InflacionTab isMobile={isMobile} />
        ) : null}
      </main>

      <footer style={{
        textAlign: 'center', padding: '14px 20px', fontSize: 11, color: 'var(--text-muted)',
        borderTop: '1px solid var(--border)', background: 'var(--bg-elevated)',
      }}>
        Simulación con fines informativos · Valores UVA y tipo de cambio oficial obtenidos de la API pública del BCRA · Los montos en pesos están a valor UVA del día
        <div style={{ marginTop: 6 }}>Desarrollado por <a href="https://github.com/rombolaagustin" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--accent)', textDecoration: 'none', fontWeight: 500 }}>@rombolaagustin</a></div>
      </footer>
    </div>
  );
}

/* ─── Simulador Tab ─── */
function SimuladorTab({ tna, setTna, valorUSD, setValorUSD, anticipo, setAnticipo, maxCuota, setMaxCuota, plazo, setPlazo, calc, isMobile }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '340px 1fr', gap: 24, alignItems: 'start', animation: 'fadeIn 0.3s ease forwards' }}>
      {/* Left: Inputs */}
      <div style={{
        background: 'var(--bg-card)', borderRadius: 'var(--radius)', border: '1px solid var(--border)',
        padding: '24px 22px', position: isMobile ? 'static' : 'sticky', top: 72,
      }}>
        <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 2 }}>Parámetros</div>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 24 }}>Ajustá los valores o hacé click para editar</div>

        <DualInput label="Valor de la vivienda" value={valorUSD} onChange={setValorUSD}
          min={20000} max={500000} step={5000} prefix="US$ " />
        <DualInput label="Anticipo" value={anticipo} onChange={setAnticipo}
          min={10} max={80} step={1} suffix="%" />
        <DualInput label="Plazo" value={plazo} onChange={setPlazo}
          min={5} max={30} step={1} suffix=" años" />
        <DualInput label="TNA (Tasa Nominal Anual)" value={tna} onChange={setTna}
          min={1} max={15} step={0.1} suffix="%" decimals={1} />
        <DualInput label="Máx. cuota / salario" value={maxCuota} onChange={setMaxCuota}
          min={10} max={40} step={1} suffix="%" />
      </div>

      {/* Right: Dashboard */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        {/* Top row: hero metrics */}
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: 14 }}>
          <HeroMetric label="Salario neto mínimo requerido" value={fmtARS(calc.salarioMinimo)}
            sub={`Cuota no supera el ${maxCuota}% del ingreso`} />
          <HeroMetric label="Cuota mensual estimada" value={fmtARS(calc.cuotaARS)}
            sub={`${fmt(calc.cuotaUVA, 2)} UVAs al valor de hoy`} />
        </div>

        {/* Metrics grid */}
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(3, 1fr)', gap: 12 }}>
          <Metric label="Monto a financiar" value={fmtUSD(calc.montoUSD)} sub={fmtARS(calc.montoARS)} icon="$" color="var(--cyan)" />
          <Metric label="Anticipo requerido" value={fmtUSD(calc.anticipoUSD)} sub={fmtARS(calc.anticipoARS)} icon="↗" color="var(--green)" />
          <Metric label="Capital en UVAs" value={fmt(calc.montoUVAs, 0)} sub="unidades de valor" icon="◆" color="var(--accent)" />
        </div>

        {/* Donut + Chart */}
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: 14 }}>
          <DonutChart capital={calc.montoARS} interes={calc.interesTotal} />
          <div style={{ background: 'var(--bg-card)', borderRadius: 'var(--radius)', border: '1px solid var(--border)', padding: '16px 18px', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
            <div style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 500, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 12 }}>Resumen rápido</div>
            {[
              ['TC oficial (COM A3500)', `${fmtARS(calc.tipoCambio)} / USD`],
              ['Valor UVA', fmtARS(calc.valorUVA)],
              ['Cuotas totales', `${calc.schedule.length} meses`],
              ['Primera cuota (UVA)', fmt(calc.cuotaUVA, 4)],
              ['Relación cuota/ingreso', `${maxCuota}%`],
            ].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid var(--bg-input)' }}>
                <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>{k}</span>
                <span style={{ fontSize: 11, fontFamily: 'var(--mono)', fontWeight: 500 }}>{v}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Amort chart preview */}
        <AmortChart schedule={calc.schedule} valorUVA={calc.valorUVA} />
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
